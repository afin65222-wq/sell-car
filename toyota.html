<!DOCTYPE html>

    <title>Toyota</title>

    <div class="logo-container">
        <div class="logo">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/ee/Toyota_logo_%28Red%29.svg/960px-Toyota_logo_%28Red%29.svg.png" alt="Logo">

        </div>
    </div>
